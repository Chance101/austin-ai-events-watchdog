name: Watchdog

# Runs the watchdog on a 6-hour cron. Exits non-zero on any alert
# so the workflow status badge turns red and the configured alerts fire.

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: watchdog
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm install

      - name: Run watchdog
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ALERT_THRESHOLD_EVENTS: ${{ secrets.ALERT_THRESHOLD_EVENTS || '5' }}
          WATCHDOG_DISABLED: ${{ secrets.WATCHDOG_DISABLED || '0' }}
        run: npm start

      - name: Create GH issue on alert
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Watchdog alert: ${new Date().toISOString().split('T')[0]}`;
            const body = `The watchdog exited with a non-zero status on run ${context.runId}.\n\nSee the logs: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['watchdog', 'alert'],
            });
